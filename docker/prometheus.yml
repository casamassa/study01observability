global:
  scrape_interval: 5s # Busca dados a cada 5 segundos

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"] # O Collector expõe as métricas da API aqui

  - job_name: "cadvisor" # Configurar o Prometheus para ler o cAdvisor
    static_configs:
      - targets: ["host.docker.internal:8080"]
