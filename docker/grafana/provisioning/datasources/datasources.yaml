apiVersion: 1
datasources:
  - name: Tempo
    type: tempo
    uid: tempo-datasource # Definir um UID fixo ajuda no link
    url: http://tempo:3200
    access: proxy

  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
    jsonData:
      derivedFields:
        - datasourceUid: tempo-datasource # Deve bater com o UID do Tempo acima
          matcherRegex: '(?:TraceId|traceId|trace_id)":"(\w+)"'
          name: TraceID
          url: "$${__value.raw}" # Note os dois '$$' para o Grafana não confundir com variável de ambiente
          internal: true
